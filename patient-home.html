<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>احجز موعدك</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body class="booking-bg">
<header class="topbar">
  <div class="topbar-brand">
    <img src="Afia_Logo.png" alt="Afia Clinic" class="logo logo-sm" />
  </div>
  <div class="topbar-actions">
    <span>حساب المريض</span>
    <button id="logout" class="link">تسجيل الخروج</button>
  </div>
</header>
<main class="auth-wrap">
  <form class="card booking-card" id="bookingForm" novalidate>
    <h1 class="booking-title">احجز موعدك</h1>
    <div class="divider"></div>

    <div class="field">
      <span class="ficon">👤</span>
      <input type="text" id="fullName" placeholder="أدخل اسمك الكامل" required />
    </div>

    <div class="field">
      <span class="ficon">📞</span>
      <input type="tel" id="phone" placeholder="أدخل رقم هاتفك" inputmode="tel" required />
    </div>

    <div class="field">
      <span class="ficon">💼</span>
      <select id="specialty" required>
        <option value="">اختر التخصص</option>
      </select>
    </div>

    <div class="field">
      <span class="ficon">🩺</span>
      <select id="doctor" required disabled>
        <option value="">اختر الطبيب</option>
      </select>
    </div>

    <div class="field">
      <span class="ficon">📅</span>
      <input type="date" id="date" required />
    </div>

    <div class="field">
      <span class="ficon">🕐</span>
      <input type="time" id="time" required />
    </div>

    <p id="err" class="error"></p>
    <button type="submit">تأكيد الحجز</button>
  </form>
</main>
<script>
  if (sessionStorage.getItem('patient_ok') !== '1') location.replace('patient.html');

  // Specialties -> doctors (from clinic roster)
  const DOCTORS = {
    "الطب النفسي": ["د/مها عبدالقادر"],
    "الباطنة العامة": ["د/وليد عبدالنافع"],
    "علاج الأورام": ["د/نفين محمود"],
    "الروماتيزم و التأهيل": ["د/مي حسين"],
    "التغذية العلاجية": ["د/أحمد الآنور"],
    "الجلدية و التجميل": [],
    "الأطفال": ["د/مروة عبدالفتاح", "د/مها الجندي", "د/وليد عبدالرحمن"],
    "النساء و التوليد": ["د/ايهب فتوح", "د/ياسر كنانة", "د/ايمان ذكري"],
    "جراحة": ["د/بلال الصفي", "د/عمرو محمد اسماعيل"]
  };

  const specSel = document.getElementById('specialty');
  const docSel  = document.getElementById('doctor');
  Object.keys(DOCTORS).forEach(function(s){
    const o = document.createElement('option');
    o.value = s; o.textContent = s;
    specSel.appendChild(o);
  });

  specSel.addEventListener('change', function(){
    docSel.innerHTML = '<option value="">اختر الطبيب</option>';
    const list = DOCTORS[specSel.value] || [];
    if (!list.length) {
      docSel.disabled = true;
      const o = document.createElement('option');
      o.value = ''; o.textContent = 'لا يوجد أطباء متاحون';
      docSel.appendChild(o);
      return;
    }
    docSel.disabled = false;
    list.forEach(function(d){
      const o = document.createElement('option');
      o.value = d; o.textContent = d;
      docSel.appendChild(o);
    });
  });

  // Prefill phone from login
  document.getElementById('phone').value = sessionStorage.getItem('patient_phone') || '';

  document.getElementById('bookingForm').addEventListener('submit', function(e){
    e.preventDefault();
    const err = document.getElementById('err');
    err.textContent = '';
    const data = {
      name: document.getElementById('fullName').value.trim(),
      phone: document.getElementById('phone').value.trim(),
      specialty: specSel.value,
      doctor: docSel.value,
      date: document.getElementById('date').value,
      time: document.getElementById('time').value
    };
    if (!data.name || !data.phone || !data.specialty || !data.doctor || !data.date || !data.time) {
      err.textContent = 'يرجى تعبئة جميع الحقول.'; return;
    }
    const bookings = JSON.parse(localStorage.getItem('bookings') || '[]');
    bookings.push(Object.assign({ createdAt: new Date().toISOString() }, data));
    localStorage.setItem('bookings', JSON.stringify(bookings));
    alert('تم تأكيد الحجز بنجاح ✔');
    e.target.reset();
    docSel.disabled = true;
    docSel.innerHTML = '<option value="">اختر الطبيب</option>';
  });

  document.getElementById('logout').addEventListener('click', function(){
    sessionStorage.removeItem('patient_ok');
    sessionStorage.removeItem('patient_phone');
    location.href = 'index.html';
  });
</script>
</body>
</html>
