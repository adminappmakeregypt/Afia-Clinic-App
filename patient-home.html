<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>حساب المريض</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<header class="topbar">
  <span>حساب المريض</span>
  <button id="logout" class="link">تسجيل الخروج</button>
</header>
<main class="admin-wrap">
  <h1>أهلاً بك</h1>
  <p class="muted">رقم الجوال: <span id="phoneOut"></span></p>
  <section class="tile-grid">
    <div class="tile"><h3>حجز موعد</h3><p class="muted">احجز زيارتك القادمة.</p></div>
    <div class="tile"><h3>مواعيدي</h3><p class="muted">استعرض المواعيد القادمة.</p></div>
    <div class="tile"><h3>الوصفات الطبية</h3><p class="muted">اطلع على وصفاتك.</p></div>
    <div class="tile"><h3>الملف الطبي</h3><p class="muted">سجلك الطبي المختصر.</p></div>
  </section>
</main>
<script>
  if (sessionStorage.getItem('patient_ok') !== '1') location.replace('patient.html');
  document.getElementById('phoneOut').textContent = sessionStorage.getItem('patient_phone') || '';
  document.getElementById('logout').addEventListener('click', function(){
    sessionStorage.removeItem('patient_ok');
    sessionStorage.removeItem('patient_phone');
    location.href = 'index.html';
  });
</script>
</body>
</html>
