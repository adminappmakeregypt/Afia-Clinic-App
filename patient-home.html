<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>احجز موعدك</title>
<link rel="stylesheet" href="styles.css" />
<!-- Firebase SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
</head>
<body class="booking-bg">
<header class="topbar">
  <div class="topbar-brand">
    <img src="Afia_Logo.png" alt="Afia Clinic" class="logo logo-sm" />
  </div>
  <div class="topbar-actions">
    <span>حساب المريض</span>
    <button id="logout" class="link">تسجيل الخروج</button>
  </div>
</header>
<main class="auth-wrap">
  <form class="card booking-card" id="bookingForm" novalidate>
    <h1 class="booking-title">احجز موعدك</h1>
    <div class="divider"></div>

    <div class="field">
      <span class="ficon">👤</span>
      <input type="text" id="fullName" placeholder="أدخل اسمك الكامل" required />
    </div>

    <div class="field">
      <span class="ficon">📞</span>
      <input type="tel" id="phone" placeholder="أدخل رقم هاتفك" inputmode="tel" required />
    </div>

    <div class="field">
      <span class="ficon">💼</span>
      <select id="specialty" required>
        <option value="">اختر التخصص</option>
      </select>
    </div>

    <div class="field">
      <span class="ficon">🩺</span>
      <select id="doctor" required disabled>
        <option value="">اختر الطبيب</option>
      </select>
    </div>

    <div class="field">
      <span class="ficon">📅</span>
      <input type="date" id="date" required />
    </div>

    <div class="field">
      <span class="ficon">🕐</span>
      <input type="time" id="time" required />
    </div>

    <p id="err" class="error"></p>
    <button type="submit" id="submitBtn">تأكيد الحجز</button>
  </form>
</main>
<script>
  if (sessionStorage.getItem('patient_ok') !== '1') location.replace('patient.html');

  const DOCTORS = {
    "الطب النفسي": ["د/مها عبدالقادر"],
    "الباطنة العامة": ["د/وليد عبدالنافع"],
    "علاج الأورام": ["د/نفين محمود"],
    "الروماتيزم و التأهيل": ["د/مي حسين"],
    "التغذية العلاجية": ["د/أحمد الآنور"],
    "الجلدية و التجميل": [],
    "الأطفال": ["د/مروة عبدالفتاح", "د/مها الجندي", "د/وليد عبدالرحمن"],
    "النساء و التوليد": ["د/ايهب فتوح", "د/ياسر كنانة", "د/ايمان ذكري"],
    "جراحة": ["د/بلال الصفي", "د/عمرو محمد اسماعيل"]
  };

  const specSel = document.getElementById('specialty');
  const docSel  = document.getElementById('doctor');
  Object.keys(DOCTORS).forEach(function(s){
    const o = document.createElement('option');
    o.value = s; o.textContent = s;
    specSel.appendChild(o);
  });

  specSel.addEventListener('change', function(){
    docSel.innerHTML = '<option value="">اختر الطبيب</option>';
    const list = DOCTORS[specSel.value] || [];
    if (!list.length) {
      docSel.disabled = true;
      const o = document.createElement('option');
      o.value = ''; o.textContent = 'لا يوجد أطباء متاحون';
      docSel.appendChild(o);
      return;
    }
    docSel.disabled = false;
    list.forEach(function(d){
      const o = document.createElement('option');
      o.value = d; o.textContent = d;
      docSel.appendChild(o);
    });
  });

  document.getElementById('phone').value = sessionStorage.getItem('patient_phone') || '';

  // Ensure we are signed in (anonymously) so Firestore rules "request.auth != null" pass
  auth.onAuthStateChanged(function(u){
    console.log('[Auth] state:', u ? ('uid=' + u.uid) : 'signed out');
  });
  auth.signInAnonymously().catch(function(e){
    console.error('[Auth] anonymous sign-in failed:', e);
    alert('تعذر الاتصال بخدمة المصادقة: ' + e.message + '\nيرجى تفعيل تسجيل الدخول المجهول (Anonymous) في Firebase Authentication.');
  });

  document.getElementById('bookingForm').addEventListener('submit', async function(e){
    e.preventDefault();
    const err = document.getElementById('err');
    const btn = document.getElementById('submitBtn');
    err.textContent = '';
    const data = {
      name: document.getElementById('fullName').value.trim(),
      phone: document.getElementById('phone').value.trim(),
      specialty: specSel.value,
      doctor: docSel.value,
      date: document.getElementById('date').value,
      time: document.getElementById('time').value
    };
    if (!data.name || !data.phone || !data.specialty || !data.doctor || !data.date || !data.time) {
      err.textContent = 'يرجى تعبئة جميع الحقول.'; return;
    }

    btn.disabled = true;
    try {
      // Duplicate check against Firestore
      console.log('[Firestore] checking duplicates for', data.phone, data.doctor, data.date);
      const dupSnap = await db.collection('bookings')
        .where('phone', '==', data.phone)
        .where('doctor', '==', data.doctor)
        .where('date', '==', data.date)
        .limit(1).get();
      if (!dupSnap.empty) {
        const dup = dupSnap.docs[0].data();
        alert('انت بالفعل عند حجز اليوم مع ' + dup.doctor + ' و تاريخ ' + dup.date + ' و موعد الحجز ' + dup.time);
        btn.disabled = false;
        return;
      }

      console.log('[Firestore] saving booking:', data);
      const id = await fbSaveBooking(data);
      console.log('[Firestore] saved with id:', id);
      alert('تم تأكيد الحجز بنجاح ✔');
      e.target.reset();
      docSel.disabled = true;
      docSel.innerHTML = '<option value="">اختر الطبيب</option>';
    } catch (ex) {
      console.error('[Firestore] save failed:', ex);
      err.textContent = 'تعذر حفظ الحجز: ' + (ex && ex.message ? ex.message : ex);
      alert('خطأ في حفظ الحجز إلى Firebase:\n' + (ex && ex.message ? ex.message : ex));
    } finally {
      btn.disabled = false;
    }
  });

  document.getElementById('logout').addEventListener('click', function(){
    sessionStorage.removeItem('patient_ok');
    sessionStorage.removeItem('patient_phone');
    location.href = 'index.html';
  });
</script>
</body>
</html>
