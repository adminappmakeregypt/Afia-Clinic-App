<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>عيادة عافية - اختيار الدخول</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;font-family:'Cairo',system-ui,sans-serif;background:#0a2540;overflow-x:hidden}
  .split{display:grid;grid-template-columns:1fr 1fr;min-height:100vh}
  @media(max-width:820px){.split{grid-template-columns:1fr}.right{display:none}}

  /* LEFT — teal gradient with sparkles */
  .left{
    position:relative;
    background:
      radial-gradient(circle at 20% 30%, rgba(255,255,255,.15), transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(255,255,255,.1), transparent 45%),
      linear-gradient(135deg,#2ea3a8 0%,#1b6f88 55%,#0f4a6a 100%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:40px 24px;overflow:hidden;
  }
  .left::before,.left::after{
    content:"";position:absolute;inset:0;pointer-events:none;
    background-image:
      radial-gradient(circle,#fff 1px,transparent 1.5px),
      radial-gradient(circle,#bff5ff 1px,transparent 1.5px),
      radial-gradient(circle,#fff 1px,transparent 1.2px);
    background-size:120px 140px,180px 200px,90px 110px;
    background-position:10px 20px,60px 90px,30px 140px;
    opacity:.5;animation:twinkle 4s ease-in-out infinite alternate;
  }
  .left::after{background-size:200px 220px,150px 170px,100px 130px;animation-duration:6s;opacity:.35}
  @keyframes twinkle{from{opacity:.25}to{opacity:.7}}

  .logo-badge{
    position:relative;z-index:2;background:#fff;border-radius:14px;padding:14px 22px;
    box-shadow:0 10px 30px rgba(0,0,0,.2);margin-bottom:48px;
  }
  .logo-badge img{display:block;height:60px;width:auto}

  .buttons{position:relative;z-index:2;display:flex;flex-direction:column;gap:28px;width:100%;max-width:420px}

  .neon-btn{
    position:relative;display:flex;align-items:center;justify-content:center;gap:18px;
    padding:22px 28px;border-radius:20px;text-decoration:none;
    background:rgba(10,50,70,.35);backdrop-filter:blur(4px);
    color:#fff;font-size:1.6rem;font-weight:800;letter-spacing:.5px;
    border:2px solid rgba(140,240,255,.9);
    box-shadow:
      0 0 12px rgba(140,240,255,.9),
      0 0 30px rgba(140,240,255,.6),
      inset 0 0 15px rgba(140,240,255,.25);
    transition:transform .2s ease, box-shadow .2s ease;
  }
  .neon-btn:hover{transform:translateY(-3px);box-shadow:0 0 20px rgba(140,240,255,1),0 0 50px rgba(140,240,255,.8),inset 0 0 20px rgba(140,240,255,.4)}
  .neon-btn .ico{
    display:grid;place-items:center;width:44px;height:44px;border-radius:10px;
    background:rgba(255,255,255,.08);color:#bff5ff;
  }
  .neon-btn.blue{
    border-color:rgba(120,180,255,.95);
    box-shadow:0 0 12px rgba(120,180,255,.9),0 0 30px rgba(120,180,255,.6),inset 0 0 15px rgba(120,180,255,.25);
  }
  .neon-btn.blue:hover{box-shadow:0 0 20px rgba(120,180,255,1),0 0 50px rgba(120,180,255,.8),inset 0 0 20px rgba(120,180,255,.4)}
  .neon-btn.blue .ico{color:#cfe1ff}

  /* RIGHT — reception image */
  .right{background:#f4f6f8;position:relative;overflow:hidden}
  .right img{width:100%;height:100%;object-fit:cover;display:block}
</style>
</head>
<body>
<main class="split">
  <section class="left">
    <div class="logo-badge">
      <img src="Afia_Logo.png" alt="Afia Clinic" />
    </div>
    <div class="buttons">
      <a class="neon-btn" href="patient.html">
        <span>احجز موعدك</span>
        <span class="ico" aria-hidden="true">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2"/>
            <path d="M16 2v4M8 2v4M3 10h18"/>
            <path d="m9 16 2 2 4-4"/>
          </svg>
        </span>
      </a>
      <a class="neon-btn blue" href="login.html">
        <span>المدير</span>
        <span class="ico" aria-hidden="true">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="8" r="3.5"/>
            <path d="M6 21c0-3.5 2.7-6 6-6s6 2.5 6 6"/>
            <path d="M10 15l2 3 2-3"/>
          </svg>
        </span>
      </a>
    </div>
  </section>
  <section class="right">
    <img src="reception.jpg" alt="عيادة عافية" />
  </section>
</main>
</body>
</html>
