<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>تسجيل الدخول - العيادة الطبية</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="auth-wrap">
    <section class="card">
      <h1>تسجيل الدخول</h1>
      <p class="subtitle">الوصول مسموح للمشرف فقط</p>

      <form id="loginForm" novalidate>
        <label for="email">البريد الإلكتروني</label>
        <input type="email" id="email" name="email" required autocomplete="email" placeholder="name@example.com" />

        <label for="password">كلمة المرور</label>
        <input type="password" id="password" name="password" required autocomplete="current-password" />

        <button type="submit">دخول</button>
        <p id="error" class="error" role="alert" aria-live="polite"></p>
      </form>
    </section>
  </main>
  <script src="app.js"></script>
  <script>
    // Redirect to admin if already signed in
    if (sessionStorage.getItem('clinic_admin_ok') === '1') {
      location.replace('clinic.html');
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('error');
      errEl.textContent = '';

      if (email !== ALLOWED_EMAIL) {
        errEl.textContent = 'هذا الحساب غير مصرح له بالدخول.';
        return;
      }
      const hash = await sha256(password);
      if (hash !== ALLOWED_PASSWORD_SHA256) {
        errEl.textContent = 'كلمة المرور غير صحيحة.';
        return;
      }
      sessionStorage.setItem('clinic_admin_ok', '1');
      location.replace('clinic.html');
    });
  </script>
</body>
</html>
