<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>إدارة التخصصات والأطباء</title>
<link rel="stylesheet" href="styles.css" />
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<style>
  .mg-wrap{max-width:1100px;margin:0 auto;padding:16px}
  .mg-grid{display:grid;grid-template-columns:1fr;gap:16px}
  .spec-card{border:1px solid #e5e7eb;border-radius:12px;padding:14px;background:#fff}
  .spec-head{display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:space-between}
  .spec-title{font-weight:700;font-size:1.05rem}
  .row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:8px}
  .days{display:flex;flex-wrap:wrap;gap:6px}
  .days label{display:inline-flex;align-items:center;gap:4px;background:#f3f4f6;border-radius:8px;padding:4px 8px;font-size:.9rem;cursor:pointer}
  .slots-input{flex:1;min-width:220px}
  .doc-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center;background:#fafafa;border:1px dashed #e5e7eb;border-radius:10px;padding:8px;margin-top:6px}
  .doc-row input[type=text]{min-width:160px}
  .add-line{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
  .add-line input{min-width:200px}
  .muted{color:#6b7280;font-size:.9rem}
  .danger{color:#b91c1c}
  .pill{background:#eef2ff;color:#3730a3;padding:2px 8px;border-radius:999px;font-size:.8rem}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 16px}
  details>summary{cursor:pointer;padding:4px 0;font-weight:600}
</style>
</head>
<body>
<header class="topbar">
  <div class="topbar-brand">
    <img src="Afia_Logo.png" alt="Afia Clinic" class="logo logo-sm" />
  </div>
  <div class="topbar-actions">
    <span>المدير — إدارة التخصصات والأطباء</span>
    <a class="link" href="clinic.html">الحجوزات</a>
    <button id="logout" class="link" type="button">تسجيل الخروج</button>
  </div>
</header>

<main class="mg-wrap">
  <h1>إدارة التخصصات والأطباء والمواعيد</h1>
  <p class="muted">أضف التخصصات والأطباء وحدد أيام العمل والمواعيد المتاحة. سيتم عرضها للمريض عند الحجز.</p>

  <div class="toolbar">
    <input type="text" id="newSpecName" placeholder="اسم التخصص الجديد" />
    <button id="addSpec" class="primary" type="button">إضافة تخصص</button>
    <button id="refresh" class="link" type="button">تحديث</button>
  </div>

  <div id="specList" class="mg-grid"></div>
  <p id="emptyMsg" class="muted" style="display:none">لا توجد تخصصات بعد. أضف الأول أعلاه.</p>
  <p id="statusLine" class="muted"></p>
</main>

<script>
  const WEEKDAYS = ["الأحد","الإثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];
  const listEl = document.getElementById('specList');
  const emptyMsg = document.getElementById('emptyMsg');
  const statusLine = document.getElementById('statusLine');

  document.getElementById('logout').addEventListener('click', async function(){
    try{ await auth.signOut(); }catch(_){}
    location.href='login.html';
  });
  auth.onAuthStateChanged(function(u){ if(!u) location.replace('login.html'); });

  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
  function slotsToStr(a){ return (a||[]).join(', '); }
  function strToSlots(s){
    return (s||'').split(/[,\s،]+/).map(function(x){return x.trim();}).filter(Boolean)
      .filter(function(x){ return /^\d{1,2}:\d{2}$/.test(x); })
      .map(function(x){ var p=x.split(':'); return (p[0].padStart(2,'0'))+':'+p[1]; });
  }

  let SPECS = []; // [{id,name,days:[],slots:[],doctors:[{name,days,slots}]}]

  async function load(){
    statusLine.textContent = 'جاري التحميل...';
    try{
      const snap = await db.collection('specialties').orderBy('name').get();
      SPECS = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
      render();
      statusLine.textContent = '';
    }catch(e){
      console.error(e);
      statusLine.textContent = 'تعذر التحميل: '+(e.message||e);
    }
  }

  function daysCheckboxes(prefix, selected){
    return '<div class="days">'+WEEKDAYS.map(function(w,i){
      const chk = (selected||[]).indexOf(i)>=0 ? 'checked' : '';
      return '<label><input type="checkbox" data-day="'+i+'" name="'+prefix+'" '+chk+'/> '+w+'</label>';
    }).join('')+'</div>';
  }

  function render(){
    emptyMsg.style.display = SPECS.length ? 'none' : 'block';
    listEl.innerHTML = SPECS.map(function(s){
      const doctors = s.doctors||[];
      const docsHtml = doctors.map(function(doc,idx){
        return '<div class="doc-row" data-doc-idx="'+idx+'">'
          + '<input type="text" data-doc-name="1" value="'+esc(doc.name||'')+'" placeholder="اسم الطبيب"/>'
          + daysCheckboxes('doc-days-'+idx, doc.days||[])
          + '<input class="slots-input" data-doc-slots="1" type="text" placeholder="مواعيد الطبيب (اختياري، يرث من التخصص)" value="'+esc(slotsToStr(doc.slots))+'"/>'
          + '<button class="primary" data-save-doc="1" type="button">حفظ</button>'
          + '<button class="link danger" data-del-doc="1" type="button">حذف</button>'
          + '</div>';
      }).join('');
      return '<div class="spec-card" data-spec="'+esc(s.id)+'">'
        + '<div class="spec-head">'
        +   '<div class="spec-title">'+esc(s.name)+' <span class="pill">'+doctors.length+' طبيب</span></div>'
        +   '<div class="row"><button class="link danger" data-del-spec="1" type="button">حذف التخصص</button></div>'
        + '</div>'
        + '<div class="row"><strong>جدول التخصص:</strong></div>'
        + '<div class="row">'+daysCheckboxes('spec-days', s.days||[])+'</div>'
        + '<div class="row">'
        +   '<input class="slots-input" data-spec-slots="1" type="text" placeholder="مواعيد مسموحة، مثال: 09:00, 09:30, 10:00" value="'+esc(slotsToStr(s.slots))+'"/>'
        +   '<button class="primary" data-save-spec="1" type="button">حفظ الجدول</button>'
        + '</div>'
        + '<details open><summary>الأطباء ('+doctors.length+')</summary>'
        +   '<div class="doc-list">'+docsHtml+'</div>'
        +   '<div class="add-line">'
        +     '<input type="text" data-new-doc="1" placeholder="اسم طبيب جديد"/>'
        +     '<button class="primary" data-add-doc="1" type="button">إضافة طبيب</button>'
        +   '</div>'
        + '</details>'
        + '</div>';
    }).join('');
  }

  function readDays(scope, groupName){
    return Array.from(scope.querySelectorAll('input[name="'+groupName+'"]:checked')).map(function(el){return Number(el.dataset.day);});
  }

  document.getElementById('addSpec').addEventListener('click', async function(){
    const name = document.getElementById('newSpecName').value.trim();
    if(!name){ alert('اكتب اسم التخصص'); return; }
    try{
      await db.collection('specialties').add({ name, days:[], slots:[], doctors:[] });
      document.getElementById('newSpecName').value='';
      await load();
    }catch(e){ alert('فشل الإضافة: '+(e.message||e)); }
  });
  document.getElementById('refresh').addEventListener('click', load);

  listEl.addEventListener('click', async function(e){
    const btn = e.target.closest('button'); if(!btn) return;
    const card = e.target.closest('.spec-card'); if(!card) return;
    const specId = card.dataset.spec;
    const spec = SPECS.find(function(x){return x.id===specId;}); if(!spec) return;

    if (btn.dataset.delSpec){
      if(!confirm('حذف التخصص "'+spec.name+'" وكل الأطباء تحته؟')) return;
      await db.collection('specialties').doc(specId).delete();
      return load();
    }
    if (btn.dataset.saveSpec){
      const days = readDays(card, 'spec-days');
      const slots = strToSlots(card.querySelector('[data-spec-slots]').value);
      await db.collection('specialties').doc(specId).update({ days, slots });
      statusLine.textContent = 'تم حفظ جدول: '+spec.name;
      spec.days=days; spec.slots=slots;
      return;
    }
    if (btn.dataset.addDoc){
      const name = card.querySelector('[data-new-doc]').value.trim();
      if(!name){ alert('اكتب اسم الطبيب'); return; }
      const doctors = (spec.doctors||[]).concat([{name, days:[], slots:[]}]);
      await db.collection('specialties').doc(specId).update({ doctors });
      return load();
    }
    const docRow = e.target.closest('.doc-row');
    if (!docRow) return;
    const idx = Number(docRow.dataset.docIdx);
    if (btn.dataset.delDoc){
      if(!confirm('حذف الطبيب؟')) return;
      const doctors = (spec.doctors||[]).slice(); doctors.splice(idx,1);
      await db.collection('specialties').doc(specId).update({ doctors });
      return load();
    }
    if (btn.dataset.saveDoc){
      const name = docRow.querySelector('[data-doc-name]').value.trim();
      const days = readDays(docRow, 'doc-days-'+idx);
      const slots = strToSlots(docRow.querySelector('[data-doc-slots]').value);
      const doctors = (spec.doctors||[]).slice();
      doctors[idx] = { name, days, slots };
      await db.collection('specialties').doc(specId).update({ doctors });
      spec.doctors = doctors;
      statusLine.textContent = 'تم حفظ الطبيب: '+name;
      return;
    }
  });

  var _loaded=false;
  auth.onAuthStateChanged(function(u){ if(u && !_loaded){ _loaded=true; load(); } });
</script>
</body>
</html>
