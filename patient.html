<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>دخول المريض</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<main class="auth-wrap">
  <form class="auth-card" id="patientForm">
    <img src="Afia_Logo.png" alt="Afia Clinic" class="logo" />
    <h1>دخول المريض</h1>
    <p class="muted">أدخل رقم جوالك للمتابعة (بدون تحقق)</p>
    <label for="phone">رقم الجوال</label>
    <input id="phone" name="phone" type="tel" inputmode="numeric" placeholder="01xxxxxxxxx" required />
    <button type="submit">دخول</button>
    <p class="error" id="err" hidden>يرجى إدخال رقم جوال صحيح.</p>
    <p class="muted"><a href="index.html">رجوع</a></p>
  </form>
</main>
<script>
  document.getElementById('patientForm').addEventListener('submit', function(e){
    e.preventDefault();
    var phone = document.getElementById('phone').value.trim();
    var err = document.getElementById('err');
    if (!/^[0-9]{7,15}$/.test(phone)) { err.hidden = false; return; }
    err.hidden = true;
    sessionStorage.setItem('patient_phone', phone);
    sessionStorage.setItem('patient_ok', '1');
    location.href = 'patient-home.html';
  });
</script>
</body>
</html>
