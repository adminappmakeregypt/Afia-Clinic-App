<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>العيادة الطبية - الحجوزات</title>
<link rel="stylesheet" href="styles.css" />
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
</head>
<body>
<header class="topbar">
  <div class="topbar-brand">
    <img src="Afia_Logo.png" alt="Afia Clinic" class="logo logo-sm" />
  </div>
  <div class="topbar-actions">
    <span>العيادة الطبية</span>
    <button id="refresh" class="link" type="button">تحديث</button>
    <button id="logout" class="link" type="button">تسجيل الخروج</button>
  </div>
</header>
<main class="admin-wrap">
  <h1>حجوزات المرضى</h1>

  <section class="card search-card">
    <div class="search-grid">
      <input type="text" id="qName" placeholder="بحث بالاسم" />
      <input type="tel"  id="qPhone" placeholder="بحث برقم الهاتف" />
      <input type="date" id="qDate" />
      <button id="clearSearch" class="link" type="button">مسح البحث</button>
    </div>
    <div class="muted" id="countLine">جاري التحميل...</div>
  </section>

  <section class="card">
    <div class="table-wrap">
      <table class="bookings-table">
        <thead>
          <tr>
            <th>#</th><th>الاسم</th><th>الهاتف</th><th>التخصص</th>
            <th>الطبيب</th><th>التاريخ</th><th>الوقت</th><th>إجراءات</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
      <p class="muted" id="emptyMsg" style="display:none">لا توجد حجوزات مطابقة.</p>
    </div>
  </section>
</main>

<div class="modal" id="editModal" hidden>
  <div class="modal-card card">
    <h3>تعديل الحجز</h3>
    <label>الاسم<input type="text" id="eName" /></label>
    <label>الهاتف<input type="tel" id="ePhone" /></label>
    <label>التخصص<select id="eSpecialty"></select></label>
    <label>الطبيب<select id="eDoctor"></select></label>
    <label>التاريخ<input type="date" id="eDate" /></label>
    <label>الوقت<input type="time" id="eTime" /></label>
    <div class="modal-actions">
      <button id="saveEdit" class="primary" type="button">حفظ</button>
      <button id="cancelEdit" class="link" type="button">إلغاء</button>
    </div>
  </div>
</div>

<script>
  // === Attach critical handlers FIRST so signout always works, even if Firebase hangs ===
  document.getElementById('logout').addEventListener('click', async function(){
    try { await auth.signOut(); } catch(_){}
    location.href = 'login.html';
  });

  // Firebase Auth gate: only signed-in clinic user can view this page
  auth.onAuthStateChanged(function(u){
    if (!u) { location.replace('login.html'); }
    else { console.log('[Auth] clinic signed in as', u.email); }
  });

  const DOCTORS = {
    "الطب النفسي": ["د/مها عبدالقادر"],
    "الباطنة العامة": ["د/وليد عبدالنافع"],
    "علاج الأورام": ["د/نفين محمود"],
    "الروماتيزم و التأهيل": ["د/مي حسين"],
    "التغذية العلاجية": ["د/أحمد الآنور"],
    "الجلدية و التجميل": [],
    "الأطفال": ["د/مروة عبدالفتاح", "د/مها الجندي", "د/وليد عبدالرحمن"],
    "النساء و التوليد": ["د/ايهب فتوح", "د/ياسر كنانة", "د/ايمان ذكري"],
    "جراحة": ["د/بلال الصفي", "د/عمرو محمد اسماعيل"]
  };

  let ALL = [];
  const rowsEl = document.getElementById('rows');
  const emptyMsg = document.getElementById('emptyMsg');
  const countLine = document.getElementById('countLine');
  const qName = document.getElementById('qName');
  const qPhone = document.getElementById('qPhone');
  const qDate = document.getElementById('qDate');

  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  }); }

  // Race any promise against a timeout so a broken Firestore never freezes the UI
  function withTimeout(promise, ms, label){
    return Promise.race([
      promise,
      new Promise(function(_, reject){
        setTimeout(function(){ reject(new Error((label||'operation')+' timed out after '+ms+'ms')); }, ms);
      })
    ]);
  }

  // Load bookings WITHOUT orderBy (orderBy on a missing field returns nothing / can require an index).
  // Sort client-side instead. This is the main cause of "stuck loading".
  async function loadBookingsSafe(){
    const snap = await db.collection("bookings").get();
    const list = snap.docs.map(function(d){ return Object.assign({ id: d.id }, d.data()); });
    list.sort(function(a,b){ return String(b.date||'').localeCompare(String(a.date||'')); });
    return list;
  }

  async function reload(){
    countLine.textContent = 'جاري تحميل الحجوزات...';
    try {
      ALL = await withTimeout(loadBookingsSafe(), 15000, 'Firestore load');
      render();
    } catch (e) {
      console.error('[Firestore] load failed:', e);
      ALL = [];
      render();
      countLine.textContent = 'تعذر تحميل الحجوزات: ' + (e && e.message ? e.message : e) +
        ' — تحقق من قواعد Firestore (انظر FIREBASE_SETUP.txt).';
    }
  }

  function render(){
    const n = (qName.value||'').trim().toLowerCase();
    const p = (qPhone.value||'').trim();
    const d = qDate.value;
    const filtered = ALL.filter(function(b){
      if (n && !(b.name||'').toLowerCase().includes(n)) return false;
      if (p && !(b.phone||'').includes(p)) return false;
      if (d && b.date !== d) return false;
      return true;
    });
    rowsEl.innerHTML = filtered.map(function(b, idx){
      return '<tr>'
        + '<td>'+(idx+1)+'</td>'
        + '<td>'+esc(b.name)+'</td>'
        + '<td>'+esc(b.phone)+'</td>'
        + '<td>'+esc(b.specialty)+'</td>'
        + '<td>'+esc(b.doctor)+'</td>'
        + '<td>'+esc(b.date)+'</td>'
        + '<td>'+esc(b.time)+'</td>'
        + '<td class="actions">'
        +   '<button class="link" type="button" data-edit="'+esc(b.id)+'">تعديل</button>'
        +   '<button class="link danger" type="button" data-del="'+esc(b.id)+'">حذف</button>'
        + '</td></tr>';
    }).join('');
    emptyMsg.style.display = filtered.length ? 'none' : 'block';
    countLine.textContent = 'إجمالي: ' + filtered.length + ' من ' + ALL.length;
  }

  document.getElementById('clearSearch').addEventListener('click', function(){
    qName.value=''; qPhone.value=''; qDate.value=''; render();
  });
  document.getElementById('refresh').addEventListener('click', reload);
  [qName,qPhone,qDate].forEach(function(el){ el.addEventListener('input', render); });

  rowsEl.addEventListener('click', async function(e){
    const t = e.target;
    if (t.dataset && t.dataset.del){
      if (!confirm('هل تريد حذف هذا الحجز؟')) return;
      try { await withTimeout(fbDeleteBooking(t.dataset.del), 10000, 'delete'); await reload(); }
      catch (ex) { console.error(ex); countLine.textContent = 'تعذر حذف الحجز: ' + (ex.message||ex); }
    } else if (t.dataset && t.dataset.edit){
      openEdit(t.dataset.edit);
    }
  });

  const modal = document.getElementById('editModal');
  const eName = document.getElementById('eName');
  const ePhone= document.getElementById('ePhone');
  const eSpec = document.getElementById('eSpecialty');
  const eDoc  = document.getElementById('eDoctor');
  const eDate = document.getElementById('eDate');
  const eTime = document.getElementById('eTime');
  let editId = null;

  Object.keys(DOCTORS).forEach(function(s){
    const o=document.createElement('option'); o.value=s; o.textContent=s; eSpec.appendChild(o);
  });
  function refreshDocs(selected){
    eDoc.innerHTML='';
    const list = DOCTORS[eSpec.value] || [];
    if (!list.length){
      const o=document.createElement('option'); o.value=''; o.textContent='لا يوجد أطباء'; eDoc.appendChild(o);
      eDoc.disabled = true; return;
    }
    eDoc.disabled = false;
    list.forEach(function(d){
      const o=document.createElement('option'); o.value=d; o.textContent=d;
      if (d===selected) o.selected=true;
      eDoc.appendChild(o);
    });
  }
  eSpec.addEventListener('change', function(){ refreshDocs(); });

  function openEdit(id){
    const b = ALL.find(function(x){ return x.id === id; });
    if (!b) return;
    editId = id;
    eName.value=b.name||''; ePhone.value=b.phone||'';
    eSpec.value=b.specialty||''; refreshDocs(b.doctor);
    eDate.value=b.date||''; eTime.value=b.time||'';
    modal.hidden = false;
  }
  document.getElementById('cancelEdit').addEventListener('click', function(){ modal.hidden=true; editId=null; });
  document.getElementById('saveEdit').addEventListener('click', async function(){
    if (!editId) return;
    const payload = {
      name:eName.value.trim(), phone:ePhone.value.trim(),
      specialty:eSpec.value, doctor:eDoc.value,
      date:eDate.value, time:eTime.value
    };
    try {
      await withTimeout(fbUpdateBooking(editId, payload), 10000, 'update');
      modal.hidden=true; editId=null;
      await reload();
    } catch (ex) {
      console.error(ex);
      countLine.textContent = 'تعذر تحديث الحجز: ' + (ex.message||ex);
    }
  });

  // Kick off load only after Firebase Auth confirms a signed-in user
  var _loaded = false;
  auth.onAuthStateChanged(function(u){
    if (u && !_loaded) { _loaded = true; reload(); }
  });
</script>
</body>
</html>
