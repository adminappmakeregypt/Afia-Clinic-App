<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>العيادة الطبية - الحجوزات</title>
<link rel="stylesheet" href="styles.css" />
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
</head>
<body>
<header class="topbar">
  <div class="topbar-brand">
    <img src="Afia_Logo.png" alt="Afia Clinic" class="logo logo-sm" />
  </div>
  <div class="topbar-actions">
    <span>العيادة الطبية</span>
    <button id="refresh" class="link">تحديث</button>
    <button id="logout" class="link">تسجيل الخروج</button>
  </div>
</header>
<main class="admin-wrap">
  <h1>حجوزات المرضى</h1>

  <section class="card search-card">
    <div class="search-grid">
      <input type="text" id="qName" placeholder="بحث بالاسم" />
      <input type="tel"  id="qPhone" placeholder="بحث برقم الهاتف" />
      <input type="date" id="qDate" />
      <button id="clearSearch" class="link">مسح البحث</button>
    </div>
    <div class="muted" id="countLine">جاري التحميل...</div>
  </section>

  <section class="card">
    <div class="table-wrap">
      <table class="bookings-table">
        <thead>
          <tr>
            <th>#</th>
            <th>الاسم</th>
            <th>الهاتف</th>
            <th>التخصص</th>
            <th>الطبيب</th>
            <th>التاريخ</th>
            <th>الوقت</th>
            <th>إجراءات</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
      <p class="muted" id="emptyMsg" style="display:none">لا توجد حجوزات مطابقة.</p>
    </div>
  </section>
</main>

<div class="modal" id="editModal" hidden>
  <div class="modal-card card">
    <h3>تعديل الحجز</h3>
    <label>الاسم<input type="text" id="eName" /></label>
    <label>الهاتف<input type="tel" id="ePhone" /></label>
    <label>التخصص<select id="eSpecialty"></select></label>
    <label>الطبيب<select id="eDoctor"></select></label>
    <label>التاريخ<input type="date" id="eDate" /></label>
    <label>الوقت<input type="time" id="eTime" /></label>
    <div class="modal-actions">
      <button id="saveEdit" class="primary">حفظ</button>
      <button id="cancelEdit" class="link">إلغاء</button>
    </div>
  </div>
</div>

<script>
  if (sessionStorage.getItem('clinic_admin_ok') !== '1') location.replace('login.html');
  document.getElementById('logout').addEventListener('click', function(){
    sessionStorage.removeItem('clinic_admin_ok');
    location.href = 'index.html';
  });

  const DOCTORS = {
    "الطب النفسي": ["د/مها عبدالقادر"],
    "الباطنة العامة": ["د/وليد عبدالنافع"],
    "علاج الأورام": ["د/نفين محمود"],
    "الروماتيزم و التأهيل": ["د/مي حسين"],
    "التغذية العلاجية": ["د/أحمد الآنور"],
    "الجلدية و التجميل": [],
    "الأطفال": ["د/مروة عبدالفتاح", "د/مها الجندي", "د/وليد عبدالرحمن"],
    "النساء و التوليد": ["د/ايهب فتوح", "د/ياسر كنانة", "د/ايمان ذكري"],
    "جراحة": ["د/بلال الصفي", "د/عمرو محمد اسماعيل"]
  };

  let ALL = []; // Firestore-loaded bookings

  const rowsEl = document.getElementById('rows');
  const emptyMsg = document.getElementById('emptyMsg');
  const countLine = document.getElementById('countLine');
  const qName = document.getElementById('qName');
  const qPhone = document.getElementById('qPhone');
  const qDate = document.getElementById('qDate');

  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  }); }

  async function reload(){
    countLine.textContent = 'جاري تحميل الحجوزات من Firebase...';
    try {
      console.log('[Firestore] loading bookings...');
      ALL = await fbLoadBookings();
      console.log('[Firestore] loaded', ALL.length, 'bookings');
      render();
    } catch (e) {
      console.error('[Firestore] load failed:', e);
      countLine.textContent = 'تعذر تحميل الحجوزات: ' + (e.message || e);
      alert('خطأ في تحميل الحجوزات من Firebase:\n' + (e.message || e));
    }
  }

  function render(){
    const n = (qName.value||'').trim().toLowerCase();
    const p = (qPhone.value||'').trim();
    const d = qDate.value;
    const filtered = ALL.filter(function(b){
      if (n && !(b.name||'').toLowerCase().includes(n)) return false;
      if (p && !(b.phone||'').includes(p)) return false;
      if (d && b.date !== d) return false;
      return true;
    });
    rowsEl.innerHTML = filtered.map(function(b, idx){
      return '<tr>'
        + '<td>'+(idx+1)+'</td>'
        + '<td>'+esc(b.name)+'</td>'
        + '<td>'+esc(b.phone)+'</td>'
        + '<td>'+esc(b.specialty)+'</td>'
        + '<td>'+esc(b.doctor)+'</td>'
        + '<td>'+esc(b.date)+'</td>'
        + '<td>'+esc(b.time)+'</td>'
        + '<td class="actions">'
        +   '<button class="link" data-edit="'+esc(b.id)+'">تعديل</button>'
        +   '<button class="link danger" data-del="'+esc(b.id)+'">حذف</button>'
        + '</td>'
        + '</tr>';
    }).join('');
    emptyMsg.style.display = filtered.length ? 'none' : 'block';
    countLine.textContent = 'إجمالي: ' + filtered.length + ' من ' + ALL.length;
  }

  document.getElementById('clearSearch').addEventListener('click', function(){
    qName.value=''; qPhone.value=''; qDate.value=''; render();
  });
  document.getElementById('refresh').addEventListener('click', reload);
  [qName,qPhone,qDate].forEach(function(el){ el.addEventListener('input', render); });

  rowsEl.addEventListener('click', async function(e){
    const t = e.target;
    if (t.dataset.del){
      if (!confirm('هل تريد حذف هذا الحجز؟')) return;
      try {
        console.log('[Firestore] deleting', t.dataset.del);
        await fbDeleteBooking(t.dataset.del);
        await reload();
      } catch (ex) {
        console.error('[Firestore] delete failed:', ex);
        alert('تعذر حذف الحجز: ' + (ex.message || ex));
      }
    } else if (t.dataset.edit){
      openEdit(t.dataset.edit);
    }
  });

  const modal = document.getElementById('editModal');
  const eName = document.getElementById('eName');
  const ePhone= document.getElementById('ePhone');
  const eSpec = document.getElementById('eSpecialty');
  const eDoc  = document.getElementById('eDoctor');
  const eDate = document.getElementById('eDate');
  const eTime = document.getElementById('eTime');
  let editId = null;

  Object.keys(DOCTORS).forEach(function(s){
    const o=document.createElement('option'); o.value=s; o.textContent=s; eSpec.appendChild(o);
  });
  function refreshDocs(selected){
    eDoc.innerHTML='';
    const list = DOCTORS[eSpec.value] || [];
    if (!list.length){
      const o=document.createElement('option'); o.value=''; o.textContent='لا يوجد أطباء'; eDoc.appendChild(o);
      eDoc.disabled = true; return;
    }
    eDoc.disabled = false;
    list.forEach(function(d){
      const o=document.createElement('option'); o.value=d; o.textContent=d;
      if (d===selected) o.selected=true;
      eDoc.appendChild(o);
    });
  }
  eSpec.addEventListener('change', function(){ refreshDocs(); });

  function openEdit(id){
    const b = ALL.find(function(x){ return x.id === id; });
    if (!b) return;
    editId = id;
    eName.value=b.name||''; ePhone.value=b.phone||'';
    eSpec.value=b.specialty||''; refreshDocs(b.doctor);
    eDate.value=b.date||''; eTime.value=b.time||'';
    modal.hidden = false;
  }
  document.getElementById('cancelEdit').addEventListener('click', function(){ modal.hidden=true; editId=null; });
  document.getElementById('saveEdit').addEventListener('click', async function(){
    if (!editId) return;
    const payload = {
      name:eName.value.trim(), phone:ePhone.value.trim(),
      specialty:eSpec.value, doctor:eDoc.value,
      date:eDate.value, time:eTime.value
    };
    try {
      console.log('[Firestore] updating', editId, payload);
      await fbUpdateBooking(editId, payload);
      modal.hidden=true; editId=null;
      await reload();
    } catch (ex) {
      console.error('[Firestore] update failed:', ex);
      alert('تعذر تحديث الحجز: ' + (ex.message || ex));
    }
  });

  // Try loading immediately. If Firestore rules require auth, fall back to anonymous sign-in and retry.
  async function boot(){
    try {
      await reload();
      if (ALL.length === 0) {
        // also try anon auth in case rules require it — harmless if disabled
        try { await auth.signInAnonymously(); await reload(); } catch(_) {}
      }
    } catch (e) {
      console.error('[Boot] initial load failed:', e);
      try {
        await auth.signInAnonymously();
        await reload();
      } catch (e2) {
        countLine.textContent = 'تعذر تحميل الحجوزات: ' + (e2.message || e2);
        alert('تعذر تحميل الحجوزات من Firebase:\n' + (e2.message || e2) + '\n\nتأكد من:\n1) قواعد Firestore تسمح بالقراءة (انظر FIREBASE_SETUP.txt).\n2) وجود مجموعة "bookings" أو حجوزات مضافة من صفحة المريض.');
      }
    }
  }
  boot();
</script>
</body>
</html>
