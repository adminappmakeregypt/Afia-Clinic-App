<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>العيادة الطبية</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<header class="topbar">
  <span>العيادة الطبية</span>
  <button id="logout" class="link">تسجيل الخروج</button>
</header>
<main class="admin-wrap">
  <h1>لوحة العيادة</h1>
  <section class="tile-grid">
    <div class="tile"><h3>المرضى</h3><p class="muted">إدارة سجلات المرضى.</p></div>
    <div class="tile"><h3>المواعيد</h3><p class="muted">جدولة ومتابعة المواعيد.</p></div>
    <div class="tile"><h3>الأطباء</h3><p class="muted">إدارة فريق الأطباء.</p></div>
    <div class="tile"><h3>التقارير</h3><p class="muted">تقارير الأداء والإحصاءات.</p></div>
  </section>
</main>
<script>
  if (sessionStorage.getItem('clinic_admin_ok') !== '1') location.replace('login.html');
  document.getElementById('logout').addEventListener('click', function(){
    sessionStorage.removeItem('clinic_admin_ok');
    location.href = 'index.html';
  });
</script>
</body>
</html>
