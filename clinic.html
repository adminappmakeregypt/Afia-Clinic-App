<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>العيادة الطبية</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <script>
    // Gate: block anyone not logged in
    if (sessionStorage.getItem('clinic_admin_ok') !== '1') {
      location.replace('index.html');
    }
  </script>

  <header class="topbar">
    <h1>العيادة الطبية</h1>
    <button id="logoutBtn" class="ghost">تسجيل الخروج</button>
  </header>

  <main class="admin-wrap">
    <section class="card">
      <h2>لوحة تحكم العيادة</h2>
      <p>مرحباً بك. هذه الصفحة مخصصة لإدارة العيادة الطبية.</p>

      <div class="grid">
        <article class="tile">
          <h3>المرضى</h3>
          <p>عرض وإدارة سجلات المرضى.</p>
        </article>
        <article class="tile">
          <h3>المواعيد</h3>
          <p>متابعة الحجوزات وجدول اليوم.</p>
        </article>
        <article class="tile">
          <h3>الأطباء</h3>
          <p>إدارة الأطباء والتخصصات.</p>
        </article>
        <article class="tile">
          <h3>التقارير</h3>
          <p>تقارير الأداء والإحصاءات.</p>
        </article>
      </div>
    </section>
  </main>

  <script>
    document.getElementById('logoutBtn').addEventListener('click', () => {
      sessionStorage.removeItem('clinic_admin_ok');
      location.replace('index.html');
    });
  </script>
</body>
</html>
