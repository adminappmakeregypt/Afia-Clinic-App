<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>تسجيل الدخول - العيادة الطبية</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<main class="auth-wrap">
  <form class="auth-card" id="loginForm">
    <img src="Afia_Logo.png" alt="Afia Clinic" class="logo" />
    <h1>تسجيل الدخول</h1>
    <p class="muted">الوصول مسموح للمشرف فقط</p>
    <label for="email">البريد الإلكتروني</label>
    <input id="email" name="email" type="email" autocomplete="email" required />
    <button type="submit">دخول</button>
    <p class="error" id="err" hidden>هذا البريد غير مصرح له بالدخول.</p>
    <p class="muted"><a href="index.html">رجوع</a></p>
  </form>
</main>
<script>
  var ALLOWED_EMAIL = "karimaismail1998@gmail.com";
  document.getElementById('loginForm').addEventListener('submit', function(e){
    e.preventDefault();
    var email = document.getElementById('email').value.trim().toLowerCase();
    var err = document.getElementById('err');
    if (email !== ALLOWED_EMAIL) { err.hidden = false; return; }
    err.hidden = true;
    sessionStorage.setItem('clinic_admin_ok', '1');
    location.href = 'clinic.html';
  });
</script>
</body>
</html>
