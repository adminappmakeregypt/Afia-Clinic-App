<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>تسجيل الدخول - عيادة عافية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;font-family:'Cairo',system-ui,sans-serif;background:#eaf3fb;color:#0a2540}
  .split{display:grid;grid-template-columns:1.15fr 1fr;min-height:100vh}
  @media(max-width:900px){.split{grid-template-columns:1fr}.left{min-height:220px}}

  /* LEFT — reception photo + title overlay */
  .left{
    position:relative;
    background:
      linear-gradient(180deg, rgba(234,243,251,.4) 0%, rgba(234,243,251,.15) 40%, rgba(234,243,251,.85) 100%),
      url('reception.jpg') center/cover no-repeat;
    display:flex;flex-direction:column;justify-content:space-between;
    padding:32px 40px;
  }
  .care-badge{display:flex;align-items:center;gap:10px;color:#1b6f88;font-weight:700}
  .care-badge .ic{width:38px;height:38px;border-radius:10px;background:#fff;display:grid;place-items:center;box-shadow:0 4px 14px rgba(13,110,253,.15);color:#1e40af;font-size:20px}
  .title-block{display:flex;align-items:flex-end;gap:14px;margin-bottom:8px}
  .title-icon{width:56px;height:56px;border-radius:14px;background:#fff;display:grid;place-items:center;box-shadow:0 6px 18px rgba(30,64,175,.15);color:#1e40af;font-size:26px}
  .title-block h1{font-size:38px;color:#0a2540;line-height:1.15;font-weight:800}
  .title-block h1 small{display:block;font-size:22px;font-weight:600;color:#0a2540;opacity:.85}
  .tagline{color:#334155;font-size:15px;margin-top:10px}
  .wave{position:absolute;left:0;right:0;bottom:0;height:80px;background:
    radial-gradient(120% 80px at 50% 100%, rgba(219,234,254,.9), transparent 70%);
    pointer-events:none;}

  /* RIGHT — login card */
  .right{display:flex;align-items:center;justify-content:center;padding:32px 24px;background:linear-gradient(180deg,#f4f8fd 0%,#e6eef8 100%)}
  .card{width:100%;max-width:420px;background:#fff;border-radius:20px;padding:34px 28px;box-shadow:0 20px 50px rgba(13,110,253,.12);position:relative}
  .avatar{width:74px;height:74px;border-radius:50%;background:#eaf3fb;display:grid;place-items:center;margin:-60px auto 14px;box-shadow:0 6px 18px rgba(30,64,175,.12);color:#1e40af;font-size:34px;border:4px solid #fff}
  .card h2{text-align:center;font-size:20px;font-weight:700;margin-bottom:6px;color:#0a2540}
  .card .muted{text-align:center;color:#64748b;font-size:13px;margin-bottom:18px}
  .field{display:flex;align-items:center;gap:10px;background:#f4f7fb;border:1px solid #e2e8f0;border-radius:12px;padding:4px 12px;margin-bottom:12px;transition:border-color .15s}
  .field:focus-within{border-color:#1e40af}
  .field .ic{color:#1e40af;font-size:16px;width:22px;text-align:center}
  .field input{flex:1;border:0;background:transparent;padding:12px 4px;font:inherit;color:#0a2540;text-align:right;outline:none}
  .field .toggle{background:transparent;border:0;color:#64748b;cursor:pointer;padding:6px;font-size:15px}
  .forgot{text-align:left;margin:4px 2px 14px}
  .forgot a{color:#1d4ed8;font-size:13px;text-decoration:none;font-weight:600;cursor:pointer}
  .forgot a:hover{text-decoration:underline}
  button.primary{width:100%;background:#1d4ed8;color:#fff;border:0;padding:13px;border-radius:12px;font:inherit;font-weight:700;font-size:15px;cursor:pointer;transition:background .15s}
  button.primary:hover{background:#1e3a8a}
  button.primary:disabled{opacity:.6;cursor:not-allowed}
  .msg{margin-top:12px;font-size:13px;min-height:18px;text-align:center}
  .msg.err{color:#dc2626}
  .msg.ok{color:#059669}
  .brand{margin-top:22px;display:flex;justify-content:center}
  .brand img{max-width:170px;height:auto}
  .back{display:block;text-align:center;margin-top:14px;color:#7c3aed;font-size:13px;text-decoration:none}
  .back:hover{text-decoration:underline}
</style>
</head>
<body>
<main class="split">
  <section class="left">
    <div class="care-badge"><span class="ic">✚</span><span>Care Starts Here</span></div>
    <div>
      <div class="title-block">
        <div class="title-icon">🗓️</div>
        <h1>Clinic<small>Reservation System</small></h1>
      </div>
      <p class="tagline">Easy Booking. Better Care.</p>
    </div>
    <div class="wave"></div>
  </section>

  <section class="right">
    <form class="card" id="loginForm">
      <div class="avatar">👨‍⚕️</div>
      <h2>تسجيل الدخول</h2>
      <p class="muted">الوصول مسموح للمشرف فقط</p>

      <div class="field">
        <span class="ic">👤</span>
        <input id="email" name="email" type="email" placeholder="البريد الإلكتروني" autocomplete="email" required />
      </div>
      <div class="field">
        <span class="ic">🔒</span>
        <input id="password" name="password" type="password" placeholder="كلمة المرور" autocomplete="current-password" required />
        <button type="button" class="toggle" id="togglePw" aria-label="إظهار كلمة المرور">👁️</button>
      </div>

      <div class="forgot"><a id="forgotLink">هل نسيت كلمة المرور؟</a></div>

      <button type="submit" class="primary" id="submitBtn">دخول</button>
      <p class="msg" id="msg"></p>

      <div class="brand"><img src="Afia_Logo.png" alt="Afia Clinic" /></div>
      <a class="back" href="index.html">رجوع</a>
    </form>
  </section>
</main>

<script>
  var msgEl = document.getElementById('msg');
  var btn = document.getElementById('submitBtn');

  function showMsg(text, kind){ msgEl.textContent = text || ''; msgEl.className = 'msg ' + (kind||''); }

  // Show/hide password
  document.getElementById('togglePw').addEventListener('click', function(){
    var p = document.getElementById('password');
    p.type = p.type === 'password' ? 'text' : 'password';
  });

  // If already signed in, jump straight to clinic
  auth.onAuthStateChanged(function(u){ if (u) location.replace('clinic.html'); });

  function friendlyError(ex){
    switch(ex && ex.code){
      case 'auth/invalid-credential':
      case 'auth/wrong-password':
      case 'auth/user-not-found':
        return 'البريد الإلكتروني أو كلمة المرور غير صحيحة.';
      case 'auth/invalid-email': return 'صيغة البريد الإلكتروني غير صحيحة.';
      case 'auth/too-many-requests': return 'محاولات كثيرة. حاول لاحقًا.';
      case 'auth/network-request-failed': return 'تعذر الاتصال بالإنترنت.';
      case 'auth/operation-not-allowed': return 'تسجيل الدخول بالبريد وكلمة المرور غير مفعّل في Firebase.';
      case 'auth/missing-email': return 'يرجى إدخال البريد الإلكتروني أولاً.';
      default: return (ex && ex.message) ? ex.message : 'حدث خطأ غير متوقع.';
    }
  }

  // Login
  document.getElementById('loginForm').addEventListener('submit', async function(e){
    e.preventDefault();
    var email = document.getElementById('email').value.trim();
    var password = document.getElementById('password').value;
    showMsg('', ''); btn.disabled = true;
    try {
      await auth.signInWithEmailAndPassword(email, password);
      location.href = 'clinic.html';
    } catch (ex) {
      console.error('[Auth] sign-in failed:', ex);
      showMsg(friendlyError(ex), 'err');
    } finally { btn.disabled = false; }
  });

  // Forgot password → sends Firebase reset email
  document.getElementById('forgotLink').addEventListener('click', async function(){
    var email = document.getElementById('email').value.trim();
    if (!email) { showMsg('اكتب بريدك الإلكتروني في الحقل أعلاه ثم اضغط "هل نسيت كلمة المرور؟".', 'err'); return; }
    showMsg('جاري إرسال رابط إعادة التعيين...', '');
    try {
      await auth.sendPasswordResetEmail(email);
      showMsg('تم إرسال رابط إعادة تعيين كلمة المرور إلى بريدك الإلكتروني.', 'ok');
    } catch (ex) {
      console.error('[Auth] reset failed:', ex);
      showMsg(friendlyError(ex), 'err');
    }
  });
</script>
</body>
</html>
